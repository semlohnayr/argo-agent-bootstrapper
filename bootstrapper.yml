---
- name: Bootstrap ArgoCD Agent
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - vars/vars.yml

  module_defaults:
    group/kubernetes.core.k8s:
      validate_certs: false
      host: "{{ ocp_api }}"
      username: "{{ ocp_user }}"
      password: "{{ ocp_pass }}"
      api_key: "{{ ocp_token | default(omit) }}"

  tasks:
    - name: Include Namespace Creation tasks
      ansible.builtin.include_tasks:
        file: tasks/namespace.yml

    - name: Include OperatorGroup creation tasks
      ansible.builtin.include_tasks:
        file: tasks/operatorgroup.yml

    - name: Include Operator Installation tasks
      ansible.builtin.include_tasks:
        file: tasks/operator.yml

    - name: Include ArgoCD Agent Installation tasks
      ansible.builtin.include_tasks:
        file: tasks/argocd-agent-principal.yml

    - name: Include ArgoCD Agent Registration tasks
      ansible.builtin.include_tasks:
        file: tasks/argocd-agent-registration.yml
